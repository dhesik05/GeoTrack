<!DOCTYPE html>
<html>
<head>
<title>GeoTrack</title>
</head>

<body>

<h2>GeoTrack - Location Tracker</h2>

<p>Latitude: {{ latitude }}</p>
<p>Longitude: {{ longitude }}</p>

<iframe
width="600"
height="450"
style="border:0"
loading="lazy"
allowfullscreen
src="https://maps.google.com/maps?q={{ latitude }},{{ longitude }}&z=15&output=embed">
</iframe>

</body>
</html>
